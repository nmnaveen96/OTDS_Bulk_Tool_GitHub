name: Build & Release OTDS Bulk Tool

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: otds_bulk_tool-windows.exe
            binary_path:   dist/otds_bulk_tool.exe
          - os: ubuntu-latest
            artifact_name: otds_bulk_tool-linux
            binary_path:   dist/otds_bulk_tool
          - os: macos-latest
            artifact_name: otds_bulk_tool-macos
            binary_path:   dist/otds_bulk_tool

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build executable with PyInstaller
        run: |
          pyinstaller otds_bulk_tool.spec --clean --noconfirm

      - name: Rename binary and set permissions (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          mv "${{ matrix.binary_path }}" "dist/${{ matrix.artifact_name }}"
          chmod +x "dist/${{ matrix.artifact_name }}"

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Move-Item -Path "${{ matrix.binary_path }}" `
                    -Destination "dist\${{ matrix.artifact_name }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}
          retention-days: 7

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: release_assets

      - name: List release assets
        run: ls -lh release_assets/

      - name: Determine release tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "TAG=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.TAG }}
          name: "OTDS Bulk Tool ${{ steps.tag.outputs.TAG }}"
          draft: false
          prerelease: false
          body: |
            ## OpenText OTDS Bulk Provisioning Tool ${{ steps.tag.outputs.TAG }}

            | Platform | File |
            |----------|------|
            | Windows  | `otds_bulk_tool-windows.exe` |
            | Linux    | `otds_bulk_tool-linux`       |
            | macOS    | `otds_bulk_tool-macos`       |

            ```bash
            ./otds_bulk_tool --init
            ./otds_bulk_tool --dry-run
            ./otds_bulk_tool --otds-url https://otds.yourserver.com:8443
            ```
          files: |
            release_assets/otds_bulk_tool-windows.exe
            release_assets/otds_bulk_tool-linux
            release_assets/otds_bulk_tool-macos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
